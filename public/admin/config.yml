backend:
  name: github
  repo: fuyakai/blog.xspeedup.com
  branch: master
  base_url: https://blog.xspeedup.com
  auth_endpoint: /api/auth

local_backend: false

publish_mode: editorial_workflow

media_folder: "public/assets"
public_folder: "/assets"

site_url: https://blog.xspeedup.com
display_url: https://blog.xspeedup.com
logo_url: https://blog.xspeedup.com/favicon.svg

locale: zh_Hans

collections:
  - name: "settings"
    label: "站点设置"
    delete: false
    editor:
      preview: false
    files:
      - name: "general"
        label: "基本信息"
        file: "src/data/settings.json"
        fields:
          - { label: "站点标题", name: "title", widget: "string" }
          - { label: "作者", name: "author", widget: "string" }
          - { label: "站点描述", name: "description", widget: "string" }
          - { label: "Logo", name: "logo", widget: "string", hint: "例如 /favicon.svg，先把图片放到 public/ 目录下" }
      - name: "intro"
        label: "首页介绍"
        file: "src/data/intro.md"
        fields:
          - { label: "介绍内容", name: "body", widget: "markdown" }
      - name: "about"
        label: "关于页面"
        file: "README.md"
        fields:
          - { label: "页面内容", name: "body", widget: "markdown" }
      - name: "links"
        label: "友情链接"
        file: "src/data/links.json"
        fields:
          - label: "链接分组"
            name: "groups"
            widget: "list"
            fields:
              - { label: "展示类型", name: "groupType", widget: "select", options: ["primary", "normal", "simple"], default: "normal" }
              - { label: "分组名称", name: "groupName", widget: "string" }
              - { label: "分组描述", name: "groupDesc", widget: "string" }
              - label: "链接列表"
                name: "links"
                widget: "list"
                fields:
                  - { label: "名称", name: "name", widget: "string" }
                  - { label: "链接", name: "link", widget: "string" }
                  - { label: "头像", name: "avatar", widget: "string", hint: "图片URL，可直接粘贴" }
                  - { label: "描述", name: "descr", widget: "string" }
                  - { label: "截图", name: "siteshot", widget: "string", required: false, hint: "网站截图URL，留空自动生成" }

  - name: "blog"
    label: "博客文章"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "string", required: false }
      - { label: "发布日期", name: "publishDate", widget: "datetime", format: "MMM DD YYYY", date_format: "MMM DD YYYY", time_format: false, required: false }
      - { label: "更新日期", name: "updatedDate", widget: "datetime", format: "MMM DD YYYY", date_format: "MMM DD YYYY", time_format: false, required: false }
      - { label: "标签", name: "tags", widget: "list", required: false, default: [] }
      - { label: "分类", name: "categories", widget: "list", required: false, default: ["未分类"] }
      - { label: "置顶", name: "top", widget: "number", required: false, default: 0, value_type: "int", hint: "数字越大越靠前，0 为不置顶" }
      - { label: "加密密码", name: "password", widget: "string", required: false, hint: "设置后文章需要密码才能查看，留空则不加密" }
      - label: "加密提示"
        name: "encrypt"
        widget: "object"
        required: false
        hint: "设置密码后，输入密码前的提示信息"
        fields:
          - { label: "提示文字", name: "description", widget: "string", required: false, default: "这是一篇被加密的文章哟", hint: "例如：请关注公众号XXX获取密码" }
          - { label: "输入框提示", name: "placeholder", widget: "string", required: false, default: "输入密码", hint: "密码输入框的占位文字" }
      - { label: "正文", name: "body", widget: "markdown" }
